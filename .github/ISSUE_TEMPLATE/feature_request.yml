name: Feature Request
description: If you want to propose a new feature or improvement.
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to suggest a feature request.

        Before filing, please check whether the same request has already been raised or is already being implemented in an open pull request.

        Please also consider whether the request belongs in this repository or should be proposed upstream instead. Requests that are fundamentally about VS Code, GitHub Copilot service behavior, Terraform CLI, or the AzureRM provider may need to be opened in those projects instead.
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for the feature you want.
      options:
        - label: I have searched the existing issues and pull requests
          required: true
  - type: textarea
    id: community
    attributes:
      label: Community Note
      description: This note is for the community, please leave and skip this.
      value: |
        <!--- Please keep this note for the community --->

        * Please vote on this issue by adding a :thumbsup: [reaction](https://github.blog/news-insights/product-news/add-reactions-to-pull-requests-issues-and-comments/) to the original issue to help the community and maintainers prioritize this request
        * Please do not leave comments along the lines of "+1", "me too" or "any updates", they generate extra noise for issue followers and do not help prioritize the request
        * If you are interested in working on this issue or have submitted a pull request, please leave a comment and review the [contribution guide](https://github.com/WodansSon/terraform-azurerm-ai-assisted-development/blob/main/CONTRIBUTING.md) to help

        <!--- Thank you for keeping this note for the community --->
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: Affected Component(s)
      description: Please list the toolkit component, workflow, prompt, script, or documentation area this request is about.
      placeholder: installer, regression harness, copilot instructions, review prompts
    validations:
      required: true
  - type: input
    id: toolkit
    attributes:
      label: Toolkit Version / Source Ref
      description: Which released version, bootstrap install, or repository commit are you currently using?
      placeholder: v1.0.0 or main @ abc1234
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this request solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this feature or improvement to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other solutions or workarounds have you considered?
  - type: textarea
    id: impact
    attributes:
      label: Current Workaround / Impact
      description: Describe any workaround you use today and the cost of not having this feature.
  - type: input
    id: environment
    attributes:
      label: Relevant Environment(s)
      description: If this request is environment-specific, describe that context here.
      placeholder: Windows 11, WSL2, VS Code Insiders, Remote SSH, dev container
  - type: textarea
    id: references
    attributes:
      label: References
      description: |
        Are there any related issues, pull requests, discussions, screenshots, or external documentation that should be linked here?

        If another project implements the behavior you want, include that reference as well.
